name: gift-store

# Containerized run of the three app services. Feature flags are evaluated against
# a cloud Unleash instance — there is no local Unleash here (see the Makefile / README).
# `make up` runs everything from built images; `make dev` runs the same apps on the host.
services:
  paybro:
    build:
      context: .
      dockerfile: src/payment-providers/paybro/Dockerfile
    environment:
      NODE_ENV: development
      LOG_LEVEL: info
      PAYBRO_PORT: '8400'
      PAYBRO_PUBLIC_URL: http://localhost:8400
      PAYBRO_WEBHOOK_SECRET: paybro-dev-webhook-secret
    ports:
      - '8400:8400'

  # Modern alternative provider. Started alongside PayBro but not yet wired into the
  # API (no DASHED_URL on api/api-prod) — it boots, hosts its own page, and is ready
  # to swap in later.
  dashed:
    build:
      context: .
      dockerfile: src/payment-providers/dashed/Dockerfile
    environment:
      NODE_ENV: development
      LOG_LEVEL: info
      DASHED_PORT: '8401'
      DASHED_PUBLIC_URL: http://localhost:8401
      DASHED_WEBHOOK_SECRET: dashed-dev-webhook-secret
    ports:
      - '8401:8401'

  # --- DEVELOPMENT stack (web :8080 → api :8081) ---
  api:
    build:
      context: .
      dockerfile: src/gift-store/checkout/Dockerfile
    environment:
      # Development stack → NODE_ENV development drives pretty logs + the PayBro $0.00 sandbox.
      NODE_ENV: development
      LOG_LEVEL: info
      PORT: '8081'
      PUBLIC_WEB_URL: http://localhost:8080
      # Internal address so PayBro can reach the webhook from inside the network.
      PUBLIC_API_URL: http://api:8081
      PAYBRO_URL: http://paybro:8400
      PAYBRO_WEBHOOK_SECRET: paybro-dev-webhook-secret
      # Cloud Unleash — supplied via .env (UNLEASH_API_TOKEN is minted by Terraform).
      UNLEASH_URL: ${UNLEASH_URL:-}
      UNLEASH_API_TOKEN: ${UNLEASH_API_TOKEN:-}
      # Attendee's project number — prefixes the flag + context-field names the API evaluates.
      # No default: run `make workshop-configure` (it infers your project from your permissions).
      UNLEASH_PROJECT_NUMBER: ${UNLEASH_PROJECT_NUMBER:?set UNLEASH_PROJECT_NUMBER — run make workshop-configure}
    ports:
      - '8081:8081'
    depends_on:
      paybro:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: src/gift-store/storefront/Dockerfile
      args:
        VITE_APP_NAME: gift-store-storefront
        VITE_TITLE: Unofficial FeatureOps Gift Store
        VITE_API_URL: http://localhost:8081
        VITE_UNLEASH_URL: ${VITE_UNLEASH_URL:-}
        VITE_UNLEASH_CLIENT_KEY: ${VITE_UNLEASH_CLIENT_KEY:-}
        VITE_NODE_ENV: development
        VITE_UNLEASH_PROJECT_NUMBER: ${VITE_UNLEASH_PROJECT_NUMBER:?set VITE_UNLEASH_PROJECT_NUMBER — run make workshop-configure}
    ports:
      - '8080:8080'
    depends_on:
      api:
        condition: service_started

  # --- PRODUCTION stack (web :8090 → api :8091), sharing the single PayBro ---
  api-prod:
    build:
      context: .
      dockerfile: src/gift-store/checkout/Dockerfile
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: '8091'
      PUBLIC_WEB_URL: http://localhost:8090
      # Internal address so PayBro can reach the production webhook from inside the network.
      PUBLIC_API_URL: http://api-prod:8091
      PAYBRO_URL: http://paybro:8400
      PAYBRO_WEBHOOK_SECRET: paybro-dev-webhook-secret
      # Cloud Unleash — production token supplied via .env (minted by Terraform).
      UNLEASH_URL: ${UNLEASH_URL:-}
      UNLEASH_API_TOKEN: ${UNLEASH_API_TOKEN_PRODUCTION:-}
      # Same project as the development stack (project number is environment-independent).
      UNLEASH_PROJECT_NUMBER: ${UNLEASH_PROJECT_NUMBER:?set UNLEASH_PROJECT_NUMBER — run make workshop-configure}
    ports:
      - '8091:8091'
    depends_on:
      paybro:
        condition: service_started

  web-prod:
    build:
      context: .
      dockerfile: src/gift-store/storefront/Dockerfile
      args:
        VITE_APP_NAME: gift-store-storefront
        VITE_TITLE: Unofficial FeatureOps Gift Store
        VITE_API_URL: http://localhost:8091
        VITE_UNLEASH_URL: ${VITE_UNLEASH_URL:-}
        VITE_UNLEASH_CLIENT_KEY: ${VITE_UNLEASH_CLIENT_KEY_PRODUCTION:-}
        VITE_NODE_ENV: production
        VITE_UNLEASH_PROJECT_NUMBER: ${VITE_UNLEASH_PROJECT_NUMBER:?set VITE_UNLEASH_PROJECT_NUMBER — run make workshop-configure}
    ports:
      - '8090:8080'
    depends_on:
      api-prod:
        condition: service_started
