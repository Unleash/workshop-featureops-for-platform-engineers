server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: fall back to index.html for client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache fingerprinted static assets (incl. self-hosted fonts).
  location ~* \.(?:js|css|svg|woff2?|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
